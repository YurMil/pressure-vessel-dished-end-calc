name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      # npm install instead of npm ci: the lockfile is maintained on Windows
      # and npm omits other platforms' optional native bindings (rolldown)
      # from it — npm ci then fails on Linux (npm/cli#4828).
      - run: npm install
      - run: npm test
      - run: npm run build
